<title>Los Furbis · La biblioteca de María</title>
<style>
  :root{
    --ink:#4A3B2F;
    --wood:#A9713E;
    --wood-d:#7A4E2A;
    --wood-l:#C68C55;
    --coral:#FF8A80;
    --coral-d:#E85D5D;
    --disp:'Baloo 2','Comic Sans MS','Chalkboard SE',cursive;
    --hand:'Patrick Hand','Comic Sans MS','Chalkboard SE',cursive;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    min-height:100dvh;
    font-family:var(--hand);color:var(--ink);
    background:
      radial-gradient(circle at 20% 12%, #FFE7B8 0%, transparent 40%),
      radial-gradient(circle at 82% 8%, #FFD7DD 0%, transparent 38%),
      linear-gradient(180deg,#FFF4DA 0%,#FCE9CC 100%);
    padding:max(18px, env(safe-area-inset-top)) 14px calc(28px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;
  }

  /* ---------- encabezado ---------- */
  header{width:min(96vw, 940px);text-align:center;margin-bottom:8px;position:relative}
  .crown{width:clamp(96px,26vw,150px);margin:0 auto -6px;display:block}
  .kicker{
    font-family:var(--disp);font-weight:700;letter-spacing:.22em;
    font-size:clamp(11px,2.4vw,15px);color:var(--wood-d);
    background:#FFF7E6;border:2.5px solid var(--ink);border-radius:999px;
    padding:.28em 1em;display:inline-block;transform:rotate(-1.5deg);
    box-shadow:0 3px 0 rgba(74,59,47,.22);
  }
  h1{
    font-family:var(--disp);font-weight:800;line-height:.95;margin:.28em 0 .1em;
    font-size:clamp(38px,10vw,80px);
    background:linear-gradient(90deg,#FF5A5F,#FF9F1C,#E8B90A,#43A047,#1E88E5,#8E5CD9);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    -webkit-text-stroke:2px var(--ink);
    filter:drop-shadow(0 3px 0 rgba(74,59,47,.22));
  }
  .sub{font-size:clamp(15px,3.4vw,26px);color:var(--wood-d)}
  .sub b{color:var(--coral-d)}

  /* ---------- librero ---------- */
  .shelf-wrap{width:min(96vw, 940px);display:flex;flex-direction:column;gap:clamp(20px,4vw,40px);margin-top:14px}
  .shelf{position:relative}
  .books{
    display:flex;flex-wrap:wrap;gap:clamp(14px,3vw,26px);
    justify-content:center;align-items:flex-end;
    padding:0 clamp(10px,3vw,26px) 0;
    min-height:clamp(150px,34vw,230px);
    position:relative;z-index:2;
  }
  .plank{
    height:clamp(20px,4vw,30px);border-radius:6px;position:relative;z-index:1;margin-top:-6px;
    background:linear-gradient(180deg,var(--wood-l),var(--wood) 45%,var(--wood-d));
    border:3px solid var(--ink);
    box-shadow:0 7px 0 rgba(74,59,47,.28), inset 0 3px 0 rgba(255,255,255,.25);
  }
  .plank::before,.plank::after{
    content:"";position:absolute;top:100%;width:clamp(16px,3.4vw,24px);height:clamp(18px,4vw,30px);
    background:linear-gradient(180deg,var(--wood),var(--wood-d));
    border:3px solid var(--ink);border-top:none;border-radius:0 0 6px 6px;
  }
  .plank::before{left:5%}
  .plank::after{right:5%}

  /* ---------- un libro ---------- */
  .book{
    --w:clamp(112px,25vw,168px);
    width:var(--w);cursor:pointer;border:none;background:none;padding:0;
    font-family:var(--hand);
    transition:transform .16s ease;
    transform-origin:bottom center;
    position:relative;
  }
  .book:hover,.book:focus-visible{transform:translateY(-10px) rotate(-1deg);outline:none}
  .book:active{transform:translateY(-4px)}
  .cover{
    position:relative;width:100%;aspect-ratio:3/4;border-radius:8px 12px 12px 8px;
    border:3.5px solid var(--ink);overflow:hidden;
    box-shadow:0 8px 0 rgba(74,59,47,.3), 8px 8px 18px rgba(74,59,47,.22);
  }
  .cover .spine{position:absolute;left:0;top:0;bottom:0;width:11px;background:rgba(0,0,0,.16);border-right:2px solid rgba(0,0,0,.12)}
  .cover .glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 34%, rgba(255,255,255,.5), transparent 55%);pointer-events:none}
  .cover svg{display:block;width:100%;height:100%}
  .badge{
    position:absolute;top:8px;right:8px;z-index:3;
    font-family:var(--disp);font-weight:800;color:#fff;
    width:clamp(30px,7vw,42px);height:clamp(30px,7vw,42px);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(15px,3.6vw,22px);
    background:var(--coral-d);border:3px solid #fff;
    box-shadow:0 2px 5px rgba(0,0,0,.3);
  }
  .book .label{
    margin-top:10px;text-align:center;line-height:1.15;
  }
  .label .t{font-family:var(--disp);font-weight:700;font-size:clamp(13px,2.9vw,18px);color:var(--ink);display:block}
  .label .s{font-size:clamp(11px,2.4vw,15px);color:var(--wood-d);opacity:.9}

  .book.soon{cursor:default}
  .book.soon:hover{transform:none}
  .book.soon .cover{filter:saturate(.5) brightness(.98)}
  .book.soon .cover::after{
    content:"Próximamente";position:absolute;inset:0;z-index:4;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font-family:var(--disp);font-weight:800;color:#fff;font-size:clamp(13px,3vw,18px);
    background:rgba(74,59,47,.5);padding:10px;
  }

  /* ---------- pista para agregar (solo primer render si 1 tomo) ---------- */
  .empty-hint{
    width:min(92vw,560px);margin:22px auto 0;text-align:center;
    font-size:clamp(13px,2.8vw,17px);color:var(--wood-d);opacity:.85;
    background:#FFF7E6;border:2.5px dashed var(--wood);border-radius:16px;padding:14px 18px;
  }

  footer{
    margin-top:auto;padding-top:26px;text-align:center;
    font-size:clamp(12px,2.6vw,16px);color:var(--wood-d);opacity:.8;
  }
  footer .heart{color:var(--coral-d)}

  /* apertura del libro al tocar */
  @keyframes openZoom{
    from{transform:scale(1);opacity:1}
    to{transform:scale(1.5);opacity:0}
  }
  .book.opening{animation:openZoom .34s ease forwards;z-index:20}
  @media (prefers-reduced-motion: reduce){ .book,.book.opening{animation:none;transition:none} }

  .sparkle{position:fixed;pointer-events:none;font-size:22px;z-index:30;animation:sp .7s ease forwards}
  @keyframes sp{to{transform:translateY(-40px) scale(1.4);opacity:0}}

  #reader{position:fixed;inset:0;z-index:1000;background:#F6EAD7;display:none}
  #reader.on{display:block}
  #frame{width:100%;height:100%;border:none;display:block}
  #backBtn{position:fixed;top:calc(10px + env(safe-area-inset-top));left:calc(10px + env(safe-area-inset-left));
    z-index:1001;font-family:var(--disp);font-weight:800;font-size:16px;color:#fff;
    background:#B39DDB;border:3px solid #4A3B2F;border-radius:999px;padding:9px 16px;
    box-shadow:0 4px 0 #4A3B2F;cursor:pointer;display:flex;align-items:center;gap:6px;-webkit-appearance:none}
  #backBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #4A3B2F}
  #errbox{display:none;margin:16px auto;max-width:90vw;background:#FFF1F1;border:2px solid #E85D5D;
    border-radius:14px;padding:14px 16px;color:#8A2B2B;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-word}
</style>
</head>

<script>

window.onerror = function(msg, src, line){
  if(!msg || /script error/i.test(String(msg))) return false; // ignorar error genérico entre orígenes
  var b = document.getElementById('errbox');
  if(b){ b.style.display='block'; b.textContent = 'Error: ' + msg + ' (línea ' + line + ')'; }
  return false;
};

const INK = '#4A3B2F';
const RAIN = ['#FF5A5F','#FF9F1C','#FFD23F','#66BB6A','#42A5F5','#AB7BE8'];
let _u = 0; const uid = () => 'g' + (++_u);
function mix(hex, amt){
  const n=hex.replace('#',''); const r=parseInt(n.substr(0,2),16),g=parseInt(n.substr(2,2),16),b=parseInt(n.substr(4,2),16);
  const t=amt<0?0:255,p=Math.abs(amt)/100; const c=v=>Math.round(v+(t-v)*p).toString(16).padStart(2,'0');
  return '#'+c(r)+c(g)+c(b);
}

/* --- carita de Furby (versión compacta para portadas e ícono) --- */
function furbyHead(cx, cy, s, fur, iris, opts){
  opts = opts || {};
  const rainbow = fur === 'rainbow';
  const band = py => RAIN[Math.min(5, Math.max(0, Math.floor((py-26)/26.4)))];
  const furAt = py => rainbow ? band(py) : fur;
  const dark = c => mix(c,-24), lite = c => mix(c,58);
  const id = uid();
  let g = `<g transform="translate(${cx},${cy}) scale(${s})">`;
  // pelaje borde
  let under='', main='';
  for(let a=0;a<360;a+=24){
    const r=a*Math.PI/180, px=100+58*Math.cos(r), py=98+70*Math.sin(r);
    under+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="24" fill="${dark(furAt(py))}"/>`;
    main +=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="20" fill="${furAt(py)}"/>`;
  }
  g += under + main;
  const egg='M100,24 C142,24 158,62 158,104 C158,150 132,176 100,176 C68,176 42,150 42,104 C42,62 58,24 100,24 Z';
  if(rainbow){
    g += `<clipPath id="${id}"><path d="${egg}"/></clipPath><g clip-path="url(#${id})">`;
    for(let i=0;i<6;i++) g += `<rect x="30" y="${24+i*26}" width="140" height="27" fill="${RAIN[i]}"/>`;
    g += `</g>`;
  } else g += `<path d="${egg}" fill="${fur}"/>`;
  g += `<ellipse cx="100" cy="128" rx="32" ry="36" fill="${rainbow?'#FFFDF4':lite(fur)}" opacity="0.92"/>`;
  // orejas
  const earC=furAt(20), earIn=rainbow?'#FFD1DC':lite(fur);
  g += `<path d="M64,48 C38,10 60,-10 82,13 C93,24 89,43 76,51 Z" fill="${earC}" stroke="${INK}" stroke-width="3"/>`;
  g += `<path d="M69,40 C55,18 65,8 77,21 C83,28 81,37 73,42 Z" fill="${earIn}"/>`;
  g += `<path d="M136,48 C162,10 140,-10 118,13 C107,24 111,43 124,51 Z" fill="${earC}" stroke="${INK}" stroke-width="3"/>`;
  g += `<path d="M131,40 C145,18 135,8 123,21 C117,28 119,37 127,42 Z" fill="${earIn}"/>`;
  g += `<path d="M92,20 Q97,2 106,13 M101,18 Q109,1 115,11" stroke="${dark(earC)}" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  // ojos
  const lx=(opts.look&&opts.look[0])||0, ly=(opts.look&&opts.look[1])||0;
  for(const ex of [78,122]){
    g += `<circle cx="${ex}" cy="90" r="20" fill="#fff" stroke="${INK}" stroke-width="3"/>`;
    g += `<circle cx="${ex+lx}" cy="${90+ly}" r="11" fill="${iris}"/>`;
    g += `<circle cx="${ex+lx*1.2}" cy="${90+ly*1.2}" r="5.6" fill="#2B2118"/>`;
    g += `<circle cx="${ex-4+lx}" cy="${85+ly}" r="3.4" fill="#fff"/>`;
  }
  g += `<path d="M59,80 L51,74 M62,72 L56,64 M69,67 L65,58" stroke="${INK}" stroke-width="3.4" stroke-linecap="round"/>`;
  g += `<path d="M141,80 L149,74 M138,72 L144,64 M131,67 L135,58" stroke="${INK}" stroke-width="3.4" stroke-linecap="round"/>`;
  // pico
  g += `<path d="M86,108 Q100,99 114,108 Q108,125 100,127 Q92,125 86,108 Z" fill="#FFB454" stroke="${INK}" stroke-width="3"/>`;
  g += `<path d="M93,117 Q100,127 107,117 Q102,132 99,132 Q96,130 93,117 Z" fill="#8A4444"/>`;
  // cachetes
  g += `<ellipse cx="62" cy="110" rx="8" ry="5" fill="#FF9AA2" opacity="0.55"/>`;
  g += `<ellipse cx="138" cy="110" rx="8" ry="5" fill="#FF9AA2" opacity="0.55"/>`;
  if(opts.bow) g += `<g transform="translate(133,24) rotate(18)"><path d="M0,0 C-16,-14 -22,8 -4,6 Z M0,0 C16,-14 22,8 4,6 Z" fill="#F06292" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/><circle r="4.5" fill="#EC407A" stroke="${INK}" stroke-width="2.5"/></g>`;
  return g + `</g>`;
}
function starPts(cx,cy,ro,ri,n){n=n||5;const p=[];for(let i=0;i<n*2;i++){const r=i%2?ri:ro,a=-Math.PI/2+i*Math.PI/n;p.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));}return p.join(' ');}
function star(x,y,r,c){return `<polygon points="${starPts(x,y,r,r*0.45)}" fill="${c||'#FFD34D'}" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>`;}
function sparkleS(x,y,s,c){return `<path transform="translate(${x},${y}) scale(${s})" d="M0,-12 Q2,-2 12,0 Q2,2 0,12 Q-2,2 -12,0 Q-2,-2 0,-12 Z" fill="${c||'#FFD34D'}" opacity="0.9"/>`;}

/* --- corona de Furbis para el encabezado --- */
function crownArt(){
  let c = `<svg class="crown" viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">`;
  c += furbyHead(96, 96, 0.5, '#FFD1DC', '#D0567E', {look:[3,0], bow:true});
  c += furbyHead(180, 78, 0.62, 'rainbow', '#7B4FD0', {look:[0,-2]});
  c += furbyHead(266, 96, 0.5, '#BFE6FF', '#3F8FD0', {look:[-3,0]});
  c += star(40,54,12,'#FFD34D') + star(322,58,11,'#80CBC4') + sparkleS(150,30,0.8,'#FF9AA2') + sparkleS(214,28,0.8);
  return c + `</svg>`;
}

/* --- portada en miniatura para un libro del estante --- */
function coverArt(t){
  const c1 = t.color1 || '#FF8A80', c2 = t.color2 || '#B39DDB';
  const g = uid();
  let s = `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">`;
  s += `<defs><linearGradient id="${g}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${mix(c1,40)}"/><stop offset="1" stop-color="${mix(c2,25)}"/></linearGradient></defs>`;
  s += `<rect width="300" height="400" fill="url(#${g})"/>`;
  // rayos suaves
  s += `<g opacity="0.5">`;
  for(let a=0;a<360;a+=30){const r1=a*Math.PI/180,r2=(a+14)*Math.PI/180,R=460;s+=`<path d="M150,150 L${150+R*Math.cos(r1)},${150+R*Math.sin(r1)} L${150+R*Math.cos(r2)},${150+R*Math.sin(r2)} Z" fill="#FFFFFF" opacity="0.18"/>`;}
  s += `</g>`;
  // arcoíris pequeño abajo
  for(let i=0;i<6;i++){const r=150-i*9;s+=`<path d="M${150-r},430 A ${r} ${r} 0 0 1 ${150+r},430" fill="none" stroke="${RAIN[i]}" stroke-width="10" opacity="0.9"/>`;}
  s += `<ellipse cx="150" cy="392" rx="120" ry="20" fill="#8ED081"/>`;
  // Furby protagonista (arcoíris para tomo 1; para otros, usa color1)
  const heroFur = t.hero === 'rainbow' || t.numero === 1 ? 'rainbow' : (t.hero || c1);
  s += furbyHead(150, 300, 1.02, heroFur, '#7B4FD0', {look:[0,-2]});
  s += star(52,120,15,'#FFD34D') + star(250,128,13,'#FF9AA2') + sparkleS(210,84,0.9);
  // título dentro de la portada
  s += `<rect x="26" y="30" width="248" height="66" rx="16" fill="#FFFDF4" stroke="${INK}" stroke-width="4" opacity="0.96"/>`;
  s += `<text x="150" y="60" text-anchor="middle" font-family="'Baloo 2',cursive" font-weight="800" font-size="26" fill="${INK}">LOS FURBIS</text>`;
  s += `<text x="150" y="84" text-anchor="middle" font-family="'Patrick Hand',cursive" font-size="17" fill="${INK}">Tomo ${t.numero}</text>`;
  return s + `</svg>`;
}

/* --- render del estante --- */

var CATALOGO = JSON.parse(document.getElementById('catalog').textContent);
function renderShelf(){
document.getElementById('crownSlot').innerHTML = crownArt();
document.getElementById('kicker').textContent = 'LA BIBLIOTECA DE ' + (CATALOGO.autora || 'MARÍA').toUpperCase();
document.getElementById('title').textContent = CATALOGO.coleccion || 'Los Furbis';
document.getElementById('autora').textContent = CATALOGO.autora || 'María';

const wrap = document.getElementById('shelfWrap');
const tomos = (CATALOGO.tomos || []).slice().sort((a,b)=> (a.numero||0)-(b.numero||0));

// repartir los tomos en repisas de máximo 4
const PER = 4;
const shelves = [];
for(let i=0;i<Math.max(tomos.length,1);i+=PER) shelves.push(tomos.slice(i,i+PER));

shelves.forEach(group=>{
  const shelf = document.createElement('div');
  shelf.className = 'shelf';
  const books = document.createElement('div');
  books.className = 'books';
  group.forEach(t=>{
    const soon = t.estado === 'proximo';
    const el = document.createElement(soon ? 'div' : 'button');
    el.className = 'book' + (soon ? ' soon' : '');
    el.innerHTML =
      `<div class="cover">${coverArt(t)}<div class="spine"></div><div class="glow"></div>`+
      `<div class="badge">${t.numero}</div></div>`+
      `<div class="label"><span class="t">${t.emoji ? t.emoji+' ' : ''}${t.titulo}</span>`+
      (t.subtitulo ? `<span class="s">${t.subtitulo}</span>` : '')+`</div>`;
    if(!soon){
      el.addEventListener('click', e=>{
        for(let k=0;k<5;k++){
          const sp=document.createElement('div');sp.className='sparkle';
          sp.textContent=['✨','⭐','🌟','💫'][k%4];
          sp.style.left=(e.clientX-14+(Math.random()*60-30))+'px';
          sp.style.top=(e.clientY-14)+'px';
          document.body.appendChild(sp);setTimeout(()=>sp.remove(),700);
        }
        setTimeout(function(){ openBook(t.book); }, 160);
      });
    }
    books.appendChild(el);
  });
  const plank = document.createElement('div');
  plank.className = 'plank';
  shelf.appendChild(books);
  shelf.appendChild(plank);
  wrap.appendChild(shelf);
});

// pista simpática si solo hay 1 tomo (invita a seguir escribiendo)
if(tomos.filter(t=>t.estado!=='proximo').length <= 1){
  const hint = document.createElement('div');
  hint.className = 'empty-hint';
  hint.innerHTML = '📚 Este es el comienzo de la colección de María.<br>Cuando escriba el Tomo 2, aparecerá aquí en la repisa.';
  wrap.appendChild(hint);
}



}


/* ===== visor de tomos (marco aislado, mismo origen vía blob) ===== */
function b64utf8(b64){
  b64 = (b64 || '').replace(/\s+/g,'');
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  if(typeof TextDecoder !== 'undefined'){ return new TextDecoder('utf-8').decode(bytes); }
  return decodeURIComponent(escape(bin));
}
function bookHTML(i){ var el = document.getElementById(i===0 ? 'b1' : 'b2'); return b64utf8(el.textContent); }
var readerEl, frameEl, backBtn, currentUrl = null;
function openBook(i){
  try{
    var html = bookHTML(i);
    if(currentUrl){ try{ URL.revokeObjectURL(currentUrl); }catch(e){} currentUrl = null; }
    currentUrl = URL.createObjectURL(new Blob([html], {type:'text/html'}));
    frameEl.src = currentUrl;
    readerEl.classList.add('on');
    document.body.style.overflow = 'hidden';
    window.scrollTo(0,0);
  }catch(e){ showError(e); }
}
function closeBook(){
  readerEl.classList.remove('on');
  document.body.style.overflow = '';
  setTimeout(function(){
    try{ frameEl.src = 'about:blank'; }catch(e){}
    if(currentUrl){ try{ URL.revokeObjectURL(currentUrl); }catch(e){} currentUrl = null; }
  }, 150);
}
function showError(e){
  var b = document.getElementById('errbox');
  if(b){ b.style.display='block'; b.textContent = 'Ups: ' + (e && e.message ? e.message : e); }
}

function startBiblioteca(){
  try{
    readerEl = document.getElementById('reader');
    frameEl  = document.getElementById('frame');
    backBtn  = document.getElementById('backBtn');
    if(backBtn) backBtn.addEventListener('click', closeBook);
    window.addEventListener('message', function(e){ if(e.data === 'backToShelf') closeBook(); });
    renderShelf();
  }catch(e){ showError(e); }
}
if(document.readyState === 'loading'){ document.addEventListener('DOMContentLoaded', startBiblioteca); }
else { startBiblioteca(); }

</script>
